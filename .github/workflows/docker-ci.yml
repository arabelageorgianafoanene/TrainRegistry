name: Build and Push to ACR   

on:
  push:
    branches: ["master"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: |
          az acr login --name ${{ secrets.AZURE_REGISTRY_NAME }}

      - name: Build and push image
        run: |
          IMAGE=${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}/trainregistry-api:${{ github.sha }}
          docker build -t $IMAGE -f TrainRegistry.API/Dockerfile .
          docker push $IMAGE

      - name: Tag latest
        run: |
          IMAGE=${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}/trainregistry-api:${{ github.sha }}
          LATEST=${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}/trainregistry-api:latest
          docker tag $IMAGE $LATEST
          docker push $LATEST
